<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F355DA" />
      <stop offset="100%" stop-color="#7000FF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <g transform="translate(10, 10)">
    <!-- Outer glass container -->
    <rect x="0" y="0" width="60" height="60" rx="16" fill="#0b0f19" stroke="url(#grad)" stroke-width="1.5"/>
    <!-- C curve -->
    <path d="M 28 20 A 10 10 0 1 0 28 40" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)" />
    <!-- X lines -->
    <path d="M 32 22 L 44 38" stroke="url(#grad2)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)" />
    <path d="M 44 22 L 32 38" stroke="url(#grad2)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)" />
  </g>
</svg>
